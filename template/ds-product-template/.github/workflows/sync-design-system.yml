# Phase 4.13 — receive DS publish event + auto npm update + commit
# Per user 2026-05-25「任何 ds repo 增刪改,package 該同步的都應該自動自主同步」
# 2026-05-27 user verbatim「不用自動定時更新吧?只要確保主動更新時能同步到最新就好」
# → 拿掉 daily cron,改 only repository_dispatch(DS auto)+ workflow_dispatch(fork user 主動)
#
# 2 trigger:
#   1. repository_dispatch event from design-system release.yml + ssot-sync-dispatch.yml(immediate DS-side)
#   2. workflow_dispatch(fork user 主動「我想 update」)
name: Sync Design System

on:
  repository_dispatch:
    types: [design-system-published, ds-published, ds-ssot-changed]
  workflow_dispatch:

# 2026-06-07 C3 fix:同一 DS release 會同時 dispatch design-system-published / ds-published / ds-ssot-changed
# → 多個並發 run 互推 main 造成 race / non-fast-forward / 丟更新。concurrency group serialize(不取消、排隊跑)。
concurrency:
  group: ds-product-template-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 2026-07-14 dim-66:10 → 20 — push 前補跑 audit.yml 完整等價 gate(typecheck + lint +
    # 全 apps build + playwright + a11y),對齊 audit.yml timeout-minutes:15 + sync 自身開銷。
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Show payload(dispatch only)
        if: github.event_name == 'repository_dispatch'
        # 2026-07-14:client_payload 不直接 ${{ }} 內插進 run script —— payload 由外部 dispatch
        # 提供,可含 shell syntax(GitHub 官方列名 script-injection anti-pattern,本 job 持有
        # contents-write token)。改走 env var,shell 展開安全。
        env:
          DS_VERSION: ${{ github.event.client_payload.version }}
          DS_TAG: ${{ github.event.client_payload.tag }}
          DS_COMMIT: ${{ github.event.client_payload.commit }}
        run: |
          echo "DS published version: $DS_VERSION"
          echo "DS tag: $DS_TAG"
          echo "DS commit: $DS_COMMIT"

      - name: Update @qijenchen/* to latest @beta
        env:
          # 2026-07-14:同上 —— payload 進 env var 不內插 run script(anti script-injection)。
          DS_VERSION: ${{ github.event.client_payload.version }}
        run: |
          npm install --legacy-peer-deps
          # 2026-05-30 codex Phase B P2 fix:`npm update` 只更新 lockfile 不改寫 package.json spec → spec drift
          # (fork 卡 ^beta.36 而 lockfile 已 beta.38)。改 explicit `npm install @pkg@version --save` 把 spec 同步寫進
          # package.json,用 dispatch payload version(release.yml 帶);無 payload 時 fallback @beta dist-tag。
          VERSION="$DS_VERSION"
          # 2026-06-07 fix:design-system-published dispatch 送 `github.ref_name`=`v0.1.0-beta.NN`(帶 v);
          # npm range `^v0.1.0-beta.NN` 非法 → install 炸。剝掉開頭 v,兼容兩種 dispatch 格式(robust at consumer)。
          VERSION="${VERSION#v}"
          if [ -n "$VERSION" ]; then
            npm install "@qijenchen/design-system@^${VERSION}" "@qijenchen/storybook-config@^${VERSION}" --save --legacy-peer-deps
          else
            npm install "@qijenchen/design-system@beta" "@qijenchen/storybook-config@beta" --save --legacy-peer-deps
          fi
          echo "---"
          npm ls @qijenchen/design-system @qijenchen/storybook-config 2>&1 | head -5

      - name: Sync DS canonical template (fork-safe with opt-out)
        # Per user 2026-05-27 audit:直接 cp + commit 會 overwrite fork user 客製 App.tsx
        # Fork-safe checks:
        #   1. DS canonical exists
        #   2. Repo not opted out (.github/no-template-sync file)
        #   3. App.tsx not marked @template-customized
        # If all clear → cp + commit (this template repo OR identical fork)
        # If marked customized → skip
        run: |
          DS_CANONICAL="node_modules/@qijenchen/design-system/ds-canonical/templates/dashboard-app.tsx"
          PW_TEMPLATE="apps/template/src/App.tsx"
          OPT_OUT_MARKER=".github/no-template-sync"
          if [ ! -f "$DS_CANONICAL" ]; then
            echo "⚠️ DS canonical template not shipped (DS bump pending) — skip"
            exit 0
          fi
          if [ -f "$OPT_OUT_MARKER" ]; then
            echo "✓ Fork user opted out template-sync via $OPT_OUT_MARKER — skip"
            exit 0
          fi
          if grep -q '@template-customized' "$PW_TEMPLATE" 2>/dev/null; then
            echo "⚠️ App.tsx has @template-customized marker — fork user customized, skip auto-sync"
            echo "   To re-enable: remove marker + re-run workflow_dispatch"
            exit 0
          fi
          if diff -q "$DS_CANONICAL" "$PW_TEMPLATE" > /dev/null 2>&1; then
            echo "✓ PW template matches DS canonical"
            exit 0
          fi
          echo "⚠️ DS canonical template drift — syncing to PW"
          cp "$DS_CANONICAL" "$PW_TEMPLATE"

      # 2026-07-14 dim-66 修:本 job 用 GITHUB_TOKEN push — GitHub 對 workflow-triggered push
      # **不會**觸發 `on: push` 的 Audit workflow(官方 recursive-trigger 防護)→ 原本只 build
      # apps/template 就直推 main,root typecheck / internal-import lint / 其他 apps build / a11y
      # 全未驗。改在 push 前跑 audit.yml 完整等價 gate(任一 fail = 不 commit 不 push,fail-closed)。
      - name: Full audit gate(audit.yml 等價;GITHUB_TOKEN push 不觸發下游 Audit)
        run: |
          npm run typecheck
          npm run lint:imports
          npm run build
          npx playwright install --with-deps chromium
          node scripts/audit-consumer-a11y.mjs

      - name: Commit + push if changed
        run: |
          if git diff --quiet; then
            echo "✓ no changes(already latest)"
            exit 0
          fi
          git config user.name 'ds-sync-bot'
          git config user.email 'noreply@qijenchen.dev'
          git add -A
          git commit -m "chore(sync): auto-bump @qijenchen/* to latest @beta(from DS release dispatch)"
          # 2026-06-07 fix:concurrency group 序列化「本 workflow 自己的」run,但 DS repo 的 mirror workflow 也推
          # published main → 仍可能競態。fetch-rebase-retry 迴圈:被搶先乾淨疊上;真衝突 abort 重試;5 次仍失敗 FAIL
          # (不再 `|| true` 吞掉衝突 → 推 broken tree / 丟 bump)。
          for i in 1 2 3 4 5; do
            if git fetch origin main -q && git rebase origin/main -q && git push; then
              echo "✓ pushed auto-sync commit"; break
            fi
            git rebase --abort 2>/dev/null || true
            if [ "$i" -eq 5 ]; then echo "❌ push 競態重試 5 次仍失敗"; exit 1; fi
            echo "⏳ push 競態,重試 $i…"; sleep $((i * 3))
          done
